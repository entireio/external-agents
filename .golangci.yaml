version: "2"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: standard
  enable:
    - asciicheck
    - bidichk
    - copyloopvar
    - decorder
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - forcetypeassert
    - gocheckcompilerdirectives
    - gochecknoinits
    - goconst
    - gocritic
    - gosec
    - govet
    - grouper
    - importas
    - ineffassign
    - intrange
    - makezero
    - mirror
    - misspell
    - nakedret
    - nilerr
    - nilnesserr
    - nolintlint
    - perfsprint
    - reassign
    - recvcheck
    - revive
    - staticcheck
    - testableexamples
    - testifylint
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
    gosec:
      excludes:
        - G204 # subprocess with variables is expected for CLI tools
        - G304 # file inclusion via variable is expected for CLI tools
        - G705 # XSS not applicable to CLI stderr output
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    nolintlint:
      require-explanation: true
      require-specific: true
    testifylint:
      enable-all: true
  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errchkjson
          - gosec
          - goconst
          - revive
          - unparam
      - path: ^e2e/
        linters:
          - errcheck
          - gochecknoinits
          - goconst
          - gosec
          - revive
          - usetesting
