[env]
_.path = ["bin"]

[tools]
go = "1.26.0"
golangci-lint = "2.11.3"
tmux = "latest"
"go:github.com/entireio/external-agents-tests" = "latest"

[tasks.fmt]
description = "Run gofmt"
run = "gofmt -s -w ."

[tasks.lint]
description = "Run golangci-lint across all Go modules"
run = "bash ./tests/run-lint.sh"

[tasks."test:e2e"]
description = "Run e2e lifecycle tests"
run = "mise run test:e2e:lifecycle"

[tasks."test:e2e:lifecycle"]
description = "Run e2e lifecycle tests (pass E2E_AGENT=<name> to target a specific agent)"
dir = "e2e"
run = "env GOCACHE=/tmp/go-build-cache go test -tags=e2e -v -count=1 -run TestLifecycle ./..."

[tasks.build]
description = "Build all external agent binaries into bin/"
run = "bash ./tests/run-agent-task.sh build"

[tasks."lint:licenses"]
description = "Check dependency licenses across all Go modules"
run = "bash ./tests/run-license-check.sh"

[tasks.test]
description = "Run tests for all agents"
run = "bash ./tests/run-agent-task.sh test"

[tasks."test:ci"]
description = "Run CI test suite"
run = "mise run test"

[tasks.test-e2e]
hide = true
description = "Deprecated alias for test:e2e"
run = "mise run test:e2e"

[tasks.test-e2e-lifecycle]
hide = true
description = "Deprecated alias for test:e2e:lifecycle"
run = "mise run test:e2e:lifecycle"

[tasks."test:unit"]
hide = true
description = "Deprecated alias for test"
run = "mise run test"

[tasks."test:all"]
hide = true
description = "Deprecated alias for test:ci"
run = "mise run test:ci"
