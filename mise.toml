[tools]
go = "1.26.0"
"go:github.com/entireio/external-agents-tests" = "latest"

[tasks.test-e2e]
description = "Run e2e lifecycle tests"
run = "mise run test-e2e-lifecycle"

[tasks.test-e2e-lifecycle]
description = "Run e2e lifecycle tests (pass E2E_AGENT=<name> to target a specific agent)"
dir = "e2e"
run = "go test -tags=e2e -v -count=1 -run TestLifecycle ./..."

[tasks.build]
description = "Build all external agent binaries"
run = """
failed=0
for dir in agents/entire-agent-*/; do
  name=$(basename "$dir")
  echo "Building $name..."
  (cd "$dir" && go build -o "$name" ./cmd/"$name") || failed=1
done
exit $failed
"""

[tasks.test-unit]
description = "Run unit tests for all agents"
run = """
failed=0
for dir in agents/entire-agent-*/; do
  echo "Testing $dir..."
  (cd "$dir" && go test ./...) || failed=1
done
exit $failed
"""

[tasks.test-all]
description = "Run all tests"
depends = ["test-unit", "test-e2e-lifecycle"]
